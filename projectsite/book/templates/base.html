{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShelfMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f0d0b; color: #f0ede8; font-family: 'DM Sans', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 220px; position: fixed; height: 100vh; background: #141210; border-right: 1px solid rgba(255,255,255,0.065); }

</head>
<body>
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
