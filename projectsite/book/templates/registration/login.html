<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShelfMaster — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0d0b;
      color: #f0ede8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #141210;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
    }
    .eyebrow {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e8c547;
      font-weight: 700;
      margin-bottom: 6px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 32px;
      line-height: 1.1;
    }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a8580;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e8c547; }
    button {
      width: 100%;
      background: #e8c547;
      color: #0f0d0b;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    .errors {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #f87171;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Library System</div>
    <h1>Welcome back,<br>Librarian.</h1>

    {% if form.errors %}
    <div class="errors">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" id="id_username" name="username" autofocus placeholder="Enter your username" />
      <label for="id_password">Password</label>
      <input type="password" id="id_password" name="password" placeholder="Enter your password" />
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit">Sign In →</button>
    </form>
  </div>
</body>
</html>
